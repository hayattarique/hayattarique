<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
<defs>
<!-- Background gradient -->
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%"   stop-color="#050015"/>
  <stop offset="30%"  stop-color="#0e003e"/>
  <stop offset="70%"  stop-color="#190058"/>
  <stop offset="100%" stop-color="#050015"/>
</linearGradient>
<!-- Top accent bar gradient -->
<linearGradient id="topBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%"   stop-color="#6d28d9"/>
  <stop offset="30%"  stop-color="#7c3aed"/>
  <stop offset="50%"  stop-color="#a855f7"/>
  <stop offset="70%"  stop-color="#7c3aed"/>
  <stop offset="100%" stop-color="#6d28d9"/>
</linearGradient>
<!-- Shimmer sweep gradient -->
<linearGradient id="shimGrad" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%"   stop-color="white" stop-opacity="0"/>
  <stop offset="40%"  stop-color="white" stop-opacity="0.85"/>
  <stop offset="60%"  stop-color="white" stop-opacity="0.85"/>
  <stop offset="100%" stop-color="white" stop-opacity="0"/>
</linearGradient>
<!-- Aurora orb radial gradients -->
<radialGradient id="orbL" cx="50%" cy="50%" r="50%">
  <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.50"/>
  <stop offset="60%"  stop-color="#4c1d95" stop-opacity="0.18"/>
  <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
</radialGradient>
<radialGradient id="orbR" cx="50%" cy="50%" r="50%">
  <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.42"/>
  <stop offset="60%"  stop-color="#6d28d9" stop-opacity="0.15"/>
  <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
</radialGradient>
<radialGradient id="orbT" cx="50%" cy="50%" r="50%">
  <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.26"/>
  <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
</radialGradient>
<!-- Glow filter with SMIL-animated stdDeviation -->
<filter id="glow" x="-22%" y="-55%" width="144%" height="210%">
  <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur">
    <animate attributeName="stdDeviation"
      values="3.5;7.5;3.5" dur="3.5s" begin="1.6s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.5,0,0.5,1; 0.5,0,0.5,1"/>
  </feGaussianBlur>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<!-- Star softening filter -->
<filter id="sf" x="-150%" y="-150%" width="400%" height="400%">
  <feGaussianBlur in="SourceGraphic" stdDeviation="0.65"/>
</filter>
<!-- Clip for shimmer bar -->
<clipPath id="barClip"><rect width="1200" height="5"/></clipPath>
</defs>

<!-- BACKGROUND -->
<rect width="1200" height="300" fill="url(#bg)"/>

<!-- AURORA ORBS: SMIL animateTransform translate -->
<ellipse cx="300" cy="162" rx="405" ry="268" fill="url(#orbL)">
  <animateTransform attributeName="transform" type="translate"
    values="0,0; 46,-36; 0,0" dur="14s" repeatCount="indefinite"
    calcMode="spline" keyTimes="0;0.5;1"
    keySplines="0.5,0,0.5,1; 0.5,0,0.5,1"/>
</ellipse>
<ellipse cx="900" cy="138" rx="362" ry="250" fill="url(#orbR)">
  <animateTransform attributeName="transform" type="translate"
    values="0,0; -40,30; 0,0" dur="17s" repeatCount="indefinite"
    calcMode="spline" keyTimes="0;0.5;1"
    keySplines="0.5,0,0.5,1; 0.5,0,0.5,1"/>
</ellipse>
<ellipse cx="600" cy="72" rx="325" ry="204" fill="url(#orbT)">
  <animateTransform attributeName="transform" type="translate"
    values="0,0; 26,22; -22,-16; 0,0" dur="21s" repeatCount="indefinite"
    calcMode="spline" keyTimes="0;0.33;0.66;1"
    keySplines="0.5,0,0.5,1; 0.5,0,0.5,1; 0.5,0,0.5,1"/>
</ellipse>

<!-- STAR FIELD: 24 stars with SMIL opacity twinkle -->
<circle cx="50"   cy="26"  r="1.4" fill="white"   filter="url(#sf)" opacity="0.12"><animate attributeName="opacity" values="0.12;0.92;0.12" dur="2.8s" begin="0.0s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="132"  cy="14"  r="0.9" fill="white"   filter="url(#sf)" opacity="0.28"><animate attributeName="opacity" values="0.28;1.00;0.28" dur="3.5s" begin="0.4s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="228"  cy="40"  r="1.2" fill="#e9d5ff" filter="url(#sf)" opacity="0.12"><animate attributeName="opacity" values="0.12;0.92;0.12" dur="2.2s" begin="0.8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="350"  cy="16"  r="1.6" fill="white"   filter="url(#sf)" opacity="0.07"><animate attributeName="opacity" values="0.07;0.72;0.07" dur="4.1s" begin="0.2s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="472"  cy="36"  r="0.8" fill="#ddd6fe" filter="url(#sf)" opacity="0.28"><animate attributeName="opacity" values="0.28;1.00;0.28" dur="3.0s" begin="1.2s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="578"  cy="11"  r="1.3" fill="white"   filter="url(#sf)" opacity="0.12"><animate attributeName="opacity" values="0.12;0.92;0.12" dur="2.6s" begin="0.6s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="686"  cy="42"  r="0.9" fill="white"   filter="url(#sf)" opacity="0.07"><animate attributeName="opacity" values="0.07;0.72;0.07" dur="3.8s" begin="1.0s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="762"  cy="18"  r="1.5" fill="#e9d5ff" filter="url(#sf)" opacity="0.28"><animate attributeName="opacity" values="0.28;1.00;0.28" dur="2.4s" begin="1.5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="876"  cy="32"  r="1.1" fill="white"   filter="url(#sf)" opacity="0.12"><animate attributeName="opacity" values="0.12;0.92;0.12" dur="3.2s" begin="0.3s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="968"  cy="14"  r="1.2" fill="#ddd6fe" filter="url(#sf)" opacity="0.07"><animate attributeName="opacity" values="0.07;0.72;0.07" dur="2.9s" begin="0.7s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="1066" cy="44"  r="1.4" fill="white"   filter="url(#sf)" opacity="0.28"><animate attributeName="opacity" values="0.28;1.00;0.28" dur="4.0s" begin="1.1s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="1156" cy="24"  r="0.9" fill="white"   filter="url(#sf)" opacity="0.12"><animate attributeName="opacity" values="0.12;0.92;0.12" dur="2.7s" begin="1.8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="68"   cy="162" r="1.0" fill="white"   filter="url(#sf)" opacity="0.07"><animate attributeName="opacity" values="0.07;0.72;0.07" dur="3.3s" begin="0.5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="178"  cy="132" r="1.2" fill="#e9d5ff" filter="url(#sf)" opacity="0.28"><animate attributeName="opacity" values="0.28;1.00;0.28" dur="2.5s" begin="1.4s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="244"  cy="186" r="0.8" fill="white"   filter="url(#sf)" opacity="0.12"><animate attributeName="opacity" values="0.12;0.92;0.12" dur="3.6s" begin="0.9s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="110"  cy="96"  r="1.3" fill="#ddd6fe" filter="url(#sf)" opacity="0.07"><animate attributeName="opacity" values="0.07;0.72;0.07" dur="2.3s" begin="1.6s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="1038" cy="150" r="1.1" fill="white"   filter="url(#sf)" opacity="0.28"><animate attributeName="opacity" values="0.28;1.00;0.28" dur="4.2s" begin="0.1s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="1128" cy="120" r="1.3" fill="#e9d5ff" filter="url(#sf)" opacity="0.12"><animate attributeName="opacity" values="0.12;0.92;0.12" dur="3.0s" begin="2.0s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="1090" cy="88"  r="0.9" fill="white"   filter="url(#sf)" opacity="0.07"><animate attributeName="opacity" values="0.07;0.72;0.07" dur="2.8s" begin="1.3s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="1165" cy="176" r="1.0" fill="#ddd6fe" filter="url(#sf)" opacity="0.28"><animate attributeName="opacity" values="0.28;1.00;0.28" dur="3.4s" begin="0.8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="92"   cy="232" r="0.9" fill="white"   filter="url(#sf)" opacity="0.12"><animate attributeName="opacity" values="0.12;0.92;0.12" dur="2.5s" begin="1.9s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="200"  cy="214" r="1.1" fill="#e9d5ff" filter="url(#sf)" opacity="0.07"><animate attributeName="opacity" values="0.07;0.72;0.07" dur="3.1s" begin="0.45s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="330"  cy="246" r="0.8" fill="white"   filter="url(#sf)" opacity="0.28"><animate attributeName="opacity" values="0.28;1.00;0.28" dur="2.9s" begin="1.55s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>
<circle cx="1092" cy="230" r="1.2" fill="#ddd6fe" filter="url(#sf)" opacity="0.12"><animate attributeName="opacity" values="0.12;0.92;0.12" dur="3.7s" begin="0.25s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/></circle>

<!-- TOP ACCENT BAR -->
<rect x="0" y="0" width="1200" height="5" fill="url(#topBarGrad)"/>
<!-- SHIMMER SWEEP: SMIL translate -->
<g clip-path="url(#barClip)">
  <rect x="-200" y="0" width="200" height="5" fill="url(#shimGrad)">
    <animateTransform attributeName="transform" type="translate"
      values="-1300,0; 2500,0" dur="5s" begin="1.0s" repeatCount="indefinite"
      calcMode="linear"/>
  </rect>
</g>

<!-- DIVIDER LINE: SMIL stroke-dashoffset grow -->
<line x1="380" y1="162" x2="820" y2="162"
  stroke="#7c3aed" stroke-width="0.8" opacity="0.55"
  stroke-dasharray="440" stroke-dashoffset="440">
  <animate attributeName="stroke-dashoffset"
    from="440" to="0" dur="1.6s" begin="0.5s" fill="freeze"
    calcMode="spline" keyTimes="0;1" keySplines="0.25,0.46,0.45,0.94"/>
</line>

<!-- HERO NAME: SMIL fade-in + slide up -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="1.0s" begin="0.3s" fill="freeze"
    calcMode="spline" keyTimes="0;1" keySplines="0.16,1,0.3,1"/>
  <animateTransform attributeName="transform" type="translate"
    from="0,24" to="0,0" dur="1.0s" begin="0.3s" fill="freeze"
    calcMode="spline" keyTimes="0;1" keySplines="0.16,1,0.3,1"/>
  <text x="600" y="140" text-anchor="middle"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="76" font-weight="700" letter-spacing="3"
    fill="#f0e6ff" filter="url(#glow)">Tarique Hayat</text>
</g>

<!-- SUBTITLE: SMIL fade-in + slide up (delayed) -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="1.0s" begin="0.8s" fill="freeze"
    calcMode="spline" keyTimes="0;1" keySplines="0.16,1,0.3,1"/>
  <animateTransform attributeName="transform" type="translate"
    from="0,15" to="0,0" dur="1.0s" begin="0.8s" fill="freeze"
    calcMode="spline" keyTimes="0;1" keySplines="0.16,1,0.3,1"/>
  <text x="600" y="196" text-anchor="middle"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="21.5" font-weight="400" letter-spacing="1.2"
    fill="#c4b5fd">Java Backend &amp; Cloud Engineer &#xb7; Spring Boot &#xb7; AWS &#xb7; Microservices</text>
</g>

<!-- THREE PULSING ACCENT DOTS: SMIL r + opacity -->
<circle cx="576" cy="222" r="3" fill="#7c3aed">
  <animate attributeName="r"       values="3;5.8;3"       dur="2.8s" begin="0.0s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/>
  <animate attributeName="opacity" values="0.40;1.0;0.40" dur="2.8s" begin="0.0s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/>
</circle>
<circle cx="600" cy="222" r="4" fill="#a855f7">
  <animate attributeName="r"       values="4;7.2;4"       dur="2.8s" begin="0.9s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/>
  <animate attributeName="opacity" values="0.40;1.0;0.40" dur="2.8s" begin="0.9s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/>
</circle>
<circle cx="624" cy="222" r="3" fill="#7c3aed">
  <animate attributeName="r"       values="3;5.8;3"       dur="2.8s" begin="1.8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/>
  <animate attributeName="opacity" values="0.40;1.0;0.40" dur="2.8s" begin="1.8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42,0,0.58,1; 0.42,0,0.58,1"/>
</circle>

<!-- BOTTOM WAVES: SMIL translate bob -->
<g>
  <animateTransform attributeName="transform" type="translate"
    values="0,0; 0,-8; 0,0" dur="7s" repeatCount="indefinite"
    calcMode="spline" keyTimes="0;0.5;1"
    keySplines="0.45,0,0.55,1; 0.45,0,0.55,1"/>
  <path d="M0,258 Q150,244 300,260 Q450,276 600,260 Q750,244 900,258 Q1050,272 1200,258 L1200,300 L0,300 Z"
    fill="#060018" opacity="0.75"/>
</g>
<g>
  <animateTransform attributeName="transform" type="translate"
    values="0,0; 0,6; 0,0" dur="9s" repeatCount="indefinite"
    calcMode="spline" keyTimes="0;0.5;1"
    keySplines="0.45,0,0.55,1; 0.45,0,0.55,1"/>
  <path d="M0,272 Q200,258 400,272 Q600,286 800,272 Q1000,258 1200,270 L1200,300 L0,300 Z"
    fill="#050015" opacity="0.92"/>
</g>

</svg>
