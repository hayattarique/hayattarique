<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280">
  <defs>
    <!-- Deep space background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0030"/>
      <stop offset="35%"  stop-color="#1a0060"/>
      <stop offset="65%"  stop-color="#2d0080"/>
      <stop offset="100%" stop-color="#0d0030"/>
    </linearGradient>
    <!-- Top accent bar -->
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Title glow filter -->
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Star definitions -->
    <radialGradient id="star" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Left glow orb -->
    <radialGradient id="leftOrb" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <!-- Right glow orb -->
    <radialGradient id="rightOrb" cx="70%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <!-- Waving bottom path clip -->
    <clipPath id="waveClip">
      <path d="M0,0 L1200,0 L1200,240 Q1050,280 900,258 Q750,236 600,260 Q450,284 300,258 Q150,232 0,252 Z"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Ambient glow orbs -->
  <rect width="1200" height="280" fill="url(#leftOrb)"/>
  <rect width="1200" height="280" fill="url(#rightOrb)"/>

  <!-- Top accent bar (4px) -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#topBar)"/>

  <!-- Stars field -->
  <circle cx="45"  cy="32"  r="1.2" fill="url(#star)" opacity="0.8"/>
  <circle cx="120" cy="18"  r="0.8" fill="url(#star)" opacity="0.6"/>
  <circle cx="210" cy="44"  r="1.0" fill="url(#star)" opacity="0.7"/>
  <circle cx="330" cy="22"  r="1.4" fill="url(#star)" opacity="0.9"/>
  <circle cx="460" cy="38"  r="0.9" fill="url(#star)" opacity="0.5"/>
  <circle cx="570" cy="14"  r="1.1" fill="url(#star)" opacity="0.7"/>
  <circle cx="680" cy="48"  r="0.7" fill="url(#star)" opacity="0.6"/>
  <circle cx="750" cy="20"  r="1.3" fill="url(#star)" opacity="0.8"/>
  <circle cx="870" cy="36"  r="0.8" fill="url(#star)" opacity="0.5"/>
  <circle cx="960" cy="16"  r="1.0" fill="url(#star)" opacity="0.7"/>
  <circle cx="1060" cy="42" r="1.2" fill="url(#star)" opacity="0.8"/>
  <circle cx="1150" cy="26" r="0.9" fill="url(#star)" opacity="0.6"/>
  <circle cx="80"  cy="220" r="0.9" fill="url(#star)" opacity="0.4"/>
  <circle cx="190" cy="200" r="1.1" fill="url(#star)" opacity="0.6"/>
  <circle cx="310" cy="230" r="0.7" fill="url(#star)" opacity="0.4"/>
  <circle cx="440" cy="210" r="1.0" fill="url(#star)" opacity="0.5"/>
  <circle cx="720" cy="225" r="0.8" fill="url(#star)" opacity="0.4"/>
  <circle cx="900" cy="215" r="1.2" fill="url(#star)" opacity="0.6"/>
  <circle cx="1080" cy="230" r="0.9" fill="url(#star)" opacity="0.4"/>

  <!-- Subtle horizontal divider line under name -->
  <line x1="420" y1="152" x2="780" y2="152" stroke="#7c3aed" stroke-width="0.6" opacity="0.5"/>

  <!-- Name: Tarique Hayat -->
  <text
    x="600" y="132"
    text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="700"
    letter-spacing="2"
    fill="#f0e6ff"
    filter="url(#glow)"
  >Tarique Hayat</text>

  <!-- Descriptor line -->
  <text
    x="600" y="185"
    text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="400"
    letter-spacing="1"
    fill="#c9b8ff"
    opacity="0.92"
  >Java Backend &amp; Cloud Engineer  |  Spring Boot  |  AWS  |  Microservices</text>

  <!-- Tech dot separators accent -->
  <circle cx="600" cy="222" r="2.5" fill="#7c3aed" opacity="0.7"/>
  <circle cx="580" cy="222" r="1.8" fill="#a855f7" opacity="0.5"/>
  <circle cx="620" cy="222" r="1.8" fill="#a855f7" opacity="0.5"/>

  <!-- Bottom wave shape -->
  <path d="M0,248 Q150,232 300,252 Q450,272 600,252 Q750,232 900,248 Q1050,264 1200,248 L1200,280 L0,280 Z"
    fill="#0d0030" opacity="0.6"/>
  <path d="M0,260 Q200,245 400,262 Q600,279 800,262 Q1000,245 1200,258 L1200,280 L0,280 Z"
    fill="#0d0030" opacity="0.5"/>
</svg>
